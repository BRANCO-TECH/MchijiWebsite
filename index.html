
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exam Results</title>
</head>
<body>
  <h1>Check Exam Result</h1>
  Exam No: <input id="examNo" type="text"><br><br>
  DOB: <input id="dob" type="date"><br><br>
  <button onclick="checkResult()">Check</button>
  <div id="result"></div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      window.checkResult = function() {
        const examNo = document.getElementById('examNo').value.trim();
        const dob = document.getElementById('dob').value; // yyyy-mm-dd

        fetch('results.csv')
          .then(response => {
            if (!response.ok) throw new Error('CSV file not found');
            return response.text();
          })
          .then(data => {
            const rows = data.split('\n').filter(row => row.trim() !== '');
            for (let i = 1; i < rows.length; i++) {
              const row = rows[i].split(',');
              if (row.length < 6) continue; // skip invalid rows
              const csvDob = row[1].trim();
              if (row[0].trim() === examNo && formatDob(csvDob) === dob) {
                document.getElementById('result').innerHTML = `
                  Name: ${row[2]}<br>
                  BIO: ${row[3]}<br>
                  PHY: ${row[4]}<br>
                  Chem: ${row[5]}
                `;
                return;
              }
            }
            document.getElementById('result').innerHTML = 'No match found';
          })
          .catch(error => {
            document.getElementById('result').innerHTML = 'Error: ' + error.message;
            console.error(error);
          });
      };

      function formatDob(dob) {
        const parts = dob.split('/');
        return `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
      }
    });
  </script>
</body>
</html>
