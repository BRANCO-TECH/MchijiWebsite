

name: Deploy to Public Repo

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Build project
        run: |
          # Add your build commands here (e.g., npm run build)
          npm run build
      - name: Deploy to public repo
        uses: cpina/github-action-push-to-another-repository@v1
        with:
          source-directory: ./build # adjust if needed
          destination-git-username: your-username
          destination-git-email: your-email
          destination-repository-name: your-username/Mchinji-Web-Portal
          destination-branch: main
          target-directory: .
          github-token: ${{ secrets.GITHUB_TOKEN }}


